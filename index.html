    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
            background: #000000 url("https://i.imgur.com/zmi8DTM.png") center top / contain no-repeat fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            letter-spacing: 4px;
            margin: 20px 0 50px;
            color: #ffffff;
            text-transform: uppercase;
            font-family: 'Orbitron', 'Bank Gothic', 'Eurostile', sans-serif;
            font-weight: 900;
            text-shadow: 0 0 12px rgba(255,255,255,0.2);
        }

        .section-title {
            font-size: 1rem;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 35px 0 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        .grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }

        .user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-wrap {
            position: relative;
            width: 85px;
            height: 85px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #222;
            object-fit: cover;
            background: #111;
        }

        .status-dot {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #000;
        }

        .status-online { background: #23a55a; }
        .status-idle { background: #f0b232; }
        .status-dnd { background: #f23f43; }
        .status-offline { background: #80848e; }

        .username {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #ccc;
            font-family: 'Segoe UI', sans-serif;
        }

        #splash {
            position: fixed;
            inset: 0;
            background: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            letter-spacing: 2px;
            cursor: pointer;
            gap: 20px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
            opacity: 1;
            transition: opacity 0.7s ease;
        }

        #splash.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #splash.hidden {
            display: none;
        }

        #splash .main-text {
            font-size: clamp(2rem, 7vw, 2.8rem);
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }

        #splash .tap-text {
            font-size: 1.1rem;
            color: #aaaaaa;
            font-family: 'Segoe UI', sans-serif;
        }

        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            margin-top: 20px;
        }

        .marquee-content {
            display: flex;
            gap: 25px;
            animation: scroll 30s linear infinite;
            width: max-content;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .hub-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(18, 18, 18, 0.7);
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            backdrop-filter: blur(8px);
        }

        .server-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: rgba(30, 30, 30, 0.6);
            border-radius: 4px;
            text-align: left;
            cursor: pointer;
        }

        .server-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid #333;
            object-fit: cover;
        }

        .server-details h4 {
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 2px;
        }

        .server-details p {
            font-size: 0.8rem;
            color: #999;
        }

        #serverModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .modal-content {
            width: 100%;
            max-width: 380px;
            background: rgba(25, 25, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            color: #fff;
        }

        .modal-content h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .modal-content p {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 25px;
        }

        .modal-join {
            display: inline-block;
            padding: 10px 25px;
            background: rgba(45, 125, 70, 0.3);
            border: 1px solid rgba(45, 125, 70, 0.5);
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .modal-join:hover {
            background: rgba(45, 125, 70, 0.6);
            box-shadow: 0 0 12px rgba(45, 125, 70, 0.3);
        }

        .close-modal {
            margin-top: 20px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #fff;
        }
    </style>
</head>
