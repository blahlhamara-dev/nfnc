    <title>NO FACE NO CASE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 0;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: clamp(2.2rem, 8vw, 3rem);
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #fff;
            text-transform: uppercase;
        }

        .section-title {
            font-size: 0.9rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 35px 0 20px;
        }

        .grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }

        .user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-wrap {
            position: relative;
            width: 85px;
            height: 85px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #222;
            object-fit: cover;
            background: #111;
        }

        .status-dot {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #000;
        }

        .status-online { background: #23a55a; }
        .status-idle { background: #f0b232; }
        .status-dnd { background: #f23f43; }
        .status-offline { background: #80848e; }

        .username {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #ccc;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-family: 'Impact', sans-serif;
            letter-spacing: 2px;
            cursor: pointer;
            gap: 20px;
        }

        #splash .tap-text {
            font-size: 1rem;
            color: #888;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Marquee Members */
        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            margin-top: 20px;
        }

        .marquee-content {
            display: flex;
            gap: 25px;
            animation: scroll 30s linear infinite;
            width: max-content;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
