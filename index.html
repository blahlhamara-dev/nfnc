    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            max-width: 900px;imgur
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
            font-family: 'Impact', sans-serif;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            font-size: 0.9rem;
            color: #888;
        }

        .section-title {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 40px 0 20px;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            margin-bottom: 30px;
        }

        .user-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .user-card:hover {
            transform: scale(1.08);
        }

        .avatar-wrap {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #222;
            object-fit: cover;
            z-index: 2;
            position: relative;
        }

        .decor {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            pointer-events: none;
            z-index: 3;
        }

        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #000;
            z-index: 4;
        }

        .status-online { background: #23a55a; }
        .status-idle { background: #f0b232; }
        .status-dnd { background: #f23f43; }
        .status-offline { background: #80848e; }

        .username {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #aaa;
        }

        /* Gumagalaw na Members Row */
        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            position: relative;
            margin-top: 20px;
        }

        .marquee-content {
            display: flex;
            gap: 25px;
            animation: scroll 35s linear infinite;
            width: max-content;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .marquee-content:hover {
            animation-play-state: paused;
        }

        .marquee-content .avatar-wrap {
            width: 55px;
            height: 55px;
        }
    </style>
</head>

     <script>
        // Real-time Discord Status
        const socket = new WebSocket('wss://api.lanyard.rest/socket');
        const userIds = ["1497306715715010620", "1255196462195806290", "1421541305309335643", "1505646697290924103", "1475526026422649115", "851613391096381440", "1489962785839386755", "1414171167883001876"];

        socket.onopen = () => {
            socket.send(JSON.stringify({ op: 2, d: { subscribe_to_ids: userIds } }));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.op === 0 && data.d) {
                const id = data.d.discord_user.id;
                const status = data.d.discord_status;
                const avatar = data.d.discord_user.avatar;
                const avatarUrl = `https://cdn.discordapp.com/avatars/${id}/${avatar}.${avatar.startsWith('a_') ? 'gif' : 'png'}?size=128`;

                const card = document.querySelector(`.user-card[data-id="${id}"]`);
                if (card) {
                    card.querySelector('.avatar').src = avatarUrl;
                    const dot = card.querySelector('.status-dot');
                    dot.className = `status-dot status-${status}`;
                }
            }
        };
