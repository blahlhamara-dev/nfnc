    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
            /* Tamang background na sinend mo */
            background: url("https://i.imgur.com/9t8sQrX.gif") center / cover no-repeat fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.25);
            font-family: 'Impact', sans-serif;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            font-size: 0.9rem;
            color: #888;
        }

        .section-title {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 40px 0 20px;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            margin-bottom: 30px;
        }

        .user-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .user-card:hover {
            transform: scale(1.08);
        }

        .avatar-wrap {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #222;
            object-fit: cover;
            z-index: 2;
            position: relative;
            background: #111;
        }

        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #000;
            z-index: 4;
        }

        .status-online { background: #23a55a; }
        .status-idle { background: #f0b232; }
        .status-dnd { background: #f23f43; }
        .status-offline { background: #80848e; }

        .username {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #aaa;
        }

        /* Gumagalaw na Members */
        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            position: relative;
            margin-top: 20px;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }

        .marquee-content {
            display: flex;
            gap: 25px;
            animation: scroll 35s linear infinite;
            width: max-content;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .marquee-content:hover {
            animation-play-state: paused;
        }

        .marquee-content .avatar-wrap {
            width: 55px;
            height: 55px;
        }

        /* Sound Button */
        .audio-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(0,0,0,0.75);
            border: 1px solid #444;
            color: #fff;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 0 8px rgba(255,255,255,0.15);
        }
    </style>
</head>

    <script>

                }
            };
        });

        // Sound control
        const audio = document.getElementById('bgAudio');
        const audioBtn = document.getElementById('audioToggle');
        audio.volume = 0.25;

        audioBtn.addEventListener('click', () => {
            if(audio.paused) {
                audio.play().catch(err => console.log("I-click para i-play ang tunog"));

            } else {
